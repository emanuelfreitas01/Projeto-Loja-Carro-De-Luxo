  <form action="#" method="post">
    


      <div class="Conteudo">
    <h1>Formulário de Feedback</h1>
    <!-- Texto -->
    <div class="botao">
    <div class="campo">
      <label for="nome">Nome</label>
      <input type="text" id="nome" name="nome" placeholder="Seu nome completo" />
    </div>

    <!-- Número -->
    <div class="campo">
      <label for="nota">Nota (0 a 10)</label>
      <input type="number" id="nota" name="nota" min="0" max="10" placeholder="Ex: 8" />
    </div>

    <!-- Data -->
    <div class="campo">
      <label for="data">Data do Feedback</label>
      <input type="date" id="data" name="data" />
    </div>

    <!-- Select -->
    <div class="campo">
      <label for="categoria">Categoria</label>
      <select id="categoria" name="categoria">
        <option value="">Selecione...</option>
        <option value="atendimento">Atendimento</option>
        <option value="produto">Produto</option>
        <option value="entrega">Entrega</option>
        <option value="preco">Preço</option>
        <option value="outro">Outro</option>
      </select>
    </div>

    <!-- Radio -->
    <div class="campo">
      <label>Você nos recomendaria?</label>
      <div class="opcoes">
        <label><input type="radio" id="rec-sim" name="recomendacao" value="sim" /> Sim</label>
        <label><input type="radio" id="rec-talvez" name="recomendacao" value="talvez" /> Talvez</label>
        <label><input type="radio" id="rec-nao" name="recomendacao" value="nao" /> Não</label>
      </div>
    </div>


    <!-- Textarea -->
    <div class="campo">
      <label for="comentario">Comentário</label>
      <textarea id="comentario" name="comentario" placeholder="Deixe sua mensagem..."></textarea>
    </div>

    <button type="submit">Enviar Feedback</button>
  </div>
  </div>
</div>
    </div>
  
  </form>

</body>
</html>
